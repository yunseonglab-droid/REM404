<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>REM404 Archive</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
    }

    #ui {
      position: fixed;
      top: 18px;
      left: 16px;
      right: 16px;
      z-index: 9999;
      padding: 12px 14px;
      border-radius: 16px;
      color: #111;
      background: rgba(255,255,255,0.88);
      box-shadow: 0 8px 28px rgba(0,0,0,0.12);
      backdrop-filter: blur(12px);
      transition: opacity 1.2s ease;
      pointer-events: none;
    }

    #ui.fade { opacity: 0; }

    #status {
      font-size: 14px;
      font-weight: 850;
      margin-bottom: 3px;
    }

    #sub {
      font-size: 13px;
      color: rgba(17,17,17,0.68);
      line-height: 1.5;
    }

    #guide {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(72vw, 420px);
      aspect-ratio: 1.6 / 1;
      transform: translate(-50%, -50%);
      z-index: 9998;
      pointer-events: none;
      opacity: 0.45;
      transition: opacity 1.4s ease;
    }

    #guide.fade { opacity: 0; }

    .corner {
      position: absolute;
      width: 34px;
      height: 34px;
      border-color: rgba(17,17,17,0.55);
      border-style: solid;
    }

    .tl { top: 0; left: 0; border-width: 1.5px 0 0 1.5px; }
    .tr { top: 0; right: 0; border-width: 1.5px 1.5px 0 0; }
    .bl { bottom: 0; left: 0; border-width: 0 0 1.5px 1.5px; }
    .br { bottom: 0; right: 0; border-width: 0 1.5px 1.5px 0; }

    #loadingText {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10002;
      color: rgba(17,17,17,0.68);
      font-size: 13px;
      letter-spacing: 0.04em;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.9s ease;
    }

    #loadingText.hide { opacity: 0; }

    #loadingLine {
      width: 160px;
      height: 1px;
      margin-top: 14px;
      background: rgba(17,17,17,0.12);
      overflow: hidden;
    }

    #loadingLine::after {
      content: "";
      display: block;
      width: 45%;
      height: 100%;
      background: rgba(17,17,17,0.55);
      animation: lineMove 1.4s ease-in-out infinite;
    }

    @keyframes lineMove {
      0% { transform: translateX(-110%); }
      100% { transform: translateX(260%); }
    }

    #memoryBtn {
      position: fixed;
      left: 50%;
      bottom: 34px;
      transform: translateX(-50%) translateY(28px);
      z-index: 9999;
      width: calc(100vw - 48px);
      max-width: 360px;
      height: 58px;
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      color: #111;
      font-size: 16px;
      font-weight: 850;
      letter-spacing: -0.02em;
      box-shadow: 0 10px 34px rgba(0,0,0,0.26);
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    #memoryBtn.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    #memoryBtn:active {
      transform: translateX(-50%) translateY(0) scale(0.97);
    }

    #memoryBtn.nudge {
      animation: nudge 1.2s ease-in-out;
    }

    @keyframes nudge {
      0% { transform: translateX(-50%) translateY(0) scale(1); }
      35% { transform: translateX(-50%) translateY(0) scale(1.035); }
      70% { transform: translateX(-50%) translateY(0) scale(1); }
      100% { transform: translateX(-50%) translateY(0) scale(1); }
    }

    #flash {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    #archiveScreen {
      position: fixed;
      inset: 0;
      z-index: 20000;
      background: #fff;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      box-sizing: border-box;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
    }

    #archiveScreen.show {
      opacity: 1;
      pointer-events: auto;
    }

    #archiveInner {
      width: 100%;
      max-width: 420px;
    }

    .archive-animate {
      opacity: 0;
      transform: translateY(10px);
      transition:
        opacity 0.45s ease,
        transform 0.45s cubic-bezier(.22,1,.36,1);
    }

    #archiveScreen.show .archive-animate {
      opacity: 1;
      transform: translateY(0);
    }

    #archiveScreen.show .delay-1 { transition-delay: 0.16s; }
    #archiveScreen.show .delay-2 { transition-delay: 0.32s; }
    #archiveScreen.show .delay-3 { transition-delay: 0.48s; }
    #archiveScreen.show .delay-4 { transition-delay: 0.64s; }

    .archive-label {
      font-size: 12px;
      letter-spacing: .16em;
      color: #888;
      margin-bottom: 34px;
    }

    .archive-title {
      font-size: 30px;
      line-height: 1.25;
      margin: 0 0 28px;
      font-weight: 850;
      letter-spacing: -.05em;
    }

    .archive-question {
      font-size: 15px;
      line-height: 1.85;
      color: #333;
      margin-bottom: 26px;
    }

    #memoryInput {
      width: 100%;
      min-height: 118px;
      resize: none;
      box-sizing: border-box;
      border: 1px solid rgba(17,17,17,0.16);
      border-radius: 18px;
      padding: 16px;
      font-size: 15px;
      line-height: 1.6;
      font-family: inherit;
      outline: none;
      background: #fafafa;
      color: #111;
    }

    #memoryInput:focus {
      border-color: rgba(17,17,17,0.5);
      background: #fff;
    }

    #charCount {
      margin-top: 8px;
      font-size: 12px;
      color: #888;
      text-align: right;
    }

    #submitMemoryBtn {
      margin-top: 24px;
      width: 100%;
      height: 58px;
      border: 0;
      border-radius: 999px;
      background: #111;
      color: #fff;
      font-size: 16px;
      font-weight: 850;
      font-family: inherit;
      box-shadow: 0 10px 30px rgba(0,0,0,.12);
    }

    #submitMemoryBtn:disabled {
      opacity: 0.6;
    }

    #submitMemoryBtn:active {
      transform: scale(.98);
    }

    #archiveComplete { display: none; }
    #archiveComplete.show { display: block; }
    #archiveForm.hide { display: none; }

    .complete-text {
      font-size: 16px;
      line-height: 1.9;
      color: #222;
      margin-bottom: 34px;
    }

    .archive-line {
      width: 100%;
      height: 1px;
      background: rgba(17,17,17,0.12);
      margin: 28px 0;
    }

    .count-label {
      font-size: 13px;
      color: #777;
      line-height: 1.8;
      margin-bottom: 8px;
    }

    .count-number {
      font-size: 42px;
      font-weight: 850;
      letter-spacing: -.05em;
      margin-bottom: 8px;
    }

    .count-desc {
      font-size: 14px;
      color: #555;
      line-height: 1.7;
    }

    video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: 0 !important;
    }

    canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 1 !important;
      filter: blur(0px);
      transition: filter 0.08s linear;
    }

    a-scene {
      position: fixed !important;
      inset: 0 !important;
      z-index: 1 !important;
    }
  </style>
</head>

<body>
  <div id="ui">
    <div id="status">사진을 화면 중앙에 맞춰주세요.</div>
    <div id="sub">인식되면 기억이 서서히 복원됩니다.</div>
  </div>

  <div id="guide">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>

  <div id="loadingText">
    기억을 불러오는 중
    <div id="loadingLine"></div>
  </div>

  <button id="memoryBtn">기억 남기기</button>
  <div id="flash"></div>

  <div id="archiveScreen">
    <div id="archiveInner">
      <div class="archive-label archive-animate delay-1">REM404 ARCHIVE</div>

      <div id="archiveForm">
        <h1 class="archive-title archive-animate delay-2">당신의 기억</h1>

        <div class="archive-question archive-animate delay-3">
          이 공간은<br>
          당신에게<br>
          무엇을 떠올리게 했나요?
        </div>

        <div class="archive-animate delay-4">
          <textarea id="memoryInput" maxlength="80" placeholder="80자 이내로 남겨주세요."></textarea>
          <div id="charCount">0 / 80</div>

          <button id="submitMemoryBtn">기억 남기기</button>
        </div>
      </div>

      <div id="archiveComplete">
        <h1 class="archive-title">감사합니다.</h1>

        <div class="complete-text">
          당신의 기억이<br>
          REM404 Archive에<br>
          추가되었습니다.
        </div>

        <div class="archive-line"></div>

        <div class="count-label">현재까지</div>
        <div class="count-number" id="memoryCount">0</div>
        <div class="count-desc">개의 기억이 축적되었습니다.</div>
      </div>
    </div>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/target.mind; autoStart: true; uiScanning: no; uiLoading: no; uiError: yes;"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true; antialias: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <img id="aiImage" src="./assets/ai.jpg" crossorigin="anonymous">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-image
        id="aiOverlay"
        src="#aiImage"
        position="0 0 0.01"
        width="1.6"
        height="1"
        material="transparent: true; opacity: 0;">
      </a-image>
    </a-entity>
  </a-scene>

  <script type="module">
    import { saveMemory, getMemoryCount } from "./js/firebase.js";

    const statusEl = document.getElementById("status");
    const subEl = document.getElementById("sub");
    const uiEl = document.getElementById("ui");
    const guideEl = document.getElementById("guide");
    const loadingText = document.getElementById("loadingText");

    const target = document.getElementById("target");
    const overlay = document.getElementById("aiOverlay");
    const memoryBtn = document.getElementById("memoryBtn");
    const flash = document.getElementById("flash");

    const archiveScreen = document.getElementById("archiveScreen");
    const archiveForm = document.getElementById("archiveForm");
    const archiveComplete = document.getElementById("archiveComplete");
    const memoryInput = document.getElementById("memoryInput");
    const charCount = document.getElementById("charCount");
    const submitMemoryBtn = document.getElementById("submitMemoryBtn");
    const memoryCount = document.getElementById("memoryCount");

    const FADE_DURATION = 6000;
    const MAX_BLUR = 10;
    const FAIL_HINT_1 = 5000;
    const FAIL_HINT_2 = 10000;
    const BUTTON_NUDGE_TIME = 10000;

    let animationFrame = null;
    let startTime = null;
    let isImageReady = false;
    let hasOpenedArchive = false;
    let foundOnce = false;

    let hintTimer1 = null;
    let hintTimer2 = null;
    let nudgeTimer = null;
    let uiFadeTimer = null;
    let guideFadeTimer = null;

    function setOpacity(value) {
      overlay.setAttribute("material", "opacity", value);
    }

    function setCanvasBlur(value) {
      const canvas = document.querySelector("canvas");
      if (canvas) canvas.style.filter = `blur(${value}px)`;
    }

    function clearTimers() {
      clearTimeout(hintTimer1);
      clearTimeout(hintTimer2);
      clearTimeout(nudgeTimer);
      clearTimeout(uiFadeTimer);
      clearTimeout(guideFadeTimer);
    }

    function stopFade() {
      if (animationFrame) cancelAnimationFrame(animationFrame);
      animationFrame = null;
      startTime = null;
      setOpacity(0);
      setCanvasBlur(0);
    }

    function resetMemoryButton() {
      isImageReady = false;
      hasOpenedArchive = false;
      memoryBtn.textContent = "기억 남기기";
      memoryBtn.classList.remove("show");
      memoryBtn.classList.remove("nudge");
    }

    function nudgeMemoryButton() {
      if (!isImageReady || hasOpenedArchive) return;
      memoryBtn.classList.remove("nudge");
      void memoryBtn.offsetWidth;
      memoryBtn.classList.add("nudge");
    }

    function showMemoryButton() {
      isImageReady = true;
      hasOpenedArchive = false;
      memoryBtn.textContent = "기억 남기기";
      memoryBtn.classList.add("show");
      subEl.textContent = "이 공간이 떠올리게 한 기억을 남길 수 있습니다.";

      nudgeTimer = setTimeout(() => {
        nudgeMemoryButton();
      }, BUTTON_NUDGE_TIME);
    }

    function startFailHints() {
      clearTimers();

      hintTimer1 = setTimeout(() => {
        if (!foundOnce) {
          statusEl.textContent = "사진과의 거리를 조금 조정해보세요.";
          subEl.textContent = "화면 중앙에 사진이 크게 들어오면 인식이 쉬워집니다.";
        }
      }, FAIL_HINT_1);

      hintTimer2 = setTimeout(() => {
        if (!foundOnce) {
          statusEl.textContent = "빛 반사를 피해주세요.";
          subEl.textContent = "사진 표면이 너무 밝게 반사되면 인식이 어려울 수 있습니다.";
        }
      }, FAIL_HINT_2);
    }

    function stopFailHints() {
      clearTimeout(hintTimer1);
      clearTimeout(hintTimer2);
    }

    function fadeInstructionLater() {
      uiFadeTimer = setTimeout(() => {
        uiEl.classList.add("fade");
      }, 5000);

      guideFadeTimer = setTimeout(() => {
        guideEl.classList.add("fade");
      }, 7500);
    }

    function startFade() {
      stopFade();
      resetMemoryButton();

      startTime = performance.now();

      function animate(now) {
        const progress = Math.min((now - startTime) / FADE_DURATION, 1);

        let eased;

        if (progress < 0.2) {
          eased = progress * 1.5;
        } else {
          eased = 0.30 + ((progress - 0.2) / 0.8) * 0.70;
        }

        const blurAmount = Math.max(0, MAX_BLUR * (1 - progress));

        setOpacity(eased);
        setCanvasBlur(blurAmount);

        if (progress < 1) {
          animationFrame = requestAnimationFrame(animate);
        } else {
          setCanvasBlur(0);
          showMemoryButton();
        }
      }

      animationFrame = requestAnimationFrame(animate);
    }

    function cameraFlash() {
      flash.style.opacity = "1";
      setTimeout(() => {
        flash.style.opacity = "0";
      }, 150);
    }

    function hideIntroUI() {
      loadingText.classList.add("hide");
    }

    function openArchive() {
      hasOpenedArchive = true;
      clearTimeout(nudgeTimer);
      cameraFlash();

      memoryBtn.classList.remove("show");
      uiEl.classList.add("fade");
      guideEl.classList.add("fade");

      setTimeout(() => {
        archiveScreen.classList.add("show");
      }, 180);
    }

    function animateCount(from, to) {
      const duration = 850;
      const start = performance.now();

      function update(now) {
        const progress = Math.min((now - start) / duration, 1);
        const value = Math.round(from + (to - from) * progress);
        memoryCount.textContent = value.toLocaleString();

        if (progress < 1) {
          requestAnimationFrame(update);
        }
      }

      requestAnimationFrame(update);
    }

    window.addEventListener("load", () => {
      foundOnce = false;
      startFailHints();
    });

    target.addEventListener("targetFound", () => {
      foundOnce = true;
      stopFailHints();
      clearTimeout(uiFadeTimer);
      clearTimeout(guideFadeTimer);

      hideIntroUI();

      statusEl.textContent = "사진이 인식되었습니다.";
      subEl.textContent = "기억이 서서히 복원됩니다.";

      startFade();
      fadeInstructionLater();
    });

    target.addEventListener("targetLost", () => {
      if (archiveScreen.classList.contains("show")) return;

      foundOnce = false;
      clearTimers();

      statusEl.textContent = "전시 사진을 다시 비춰주세요.";
      subEl.textContent = "거리와 빛 반사를 조정해보세요.";

      uiEl.classList.remove("fade");
      guideEl.classList.remove("fade");
      loadingText.classList.remove("hide");

      resetMemoryButton();
      stopFade();
      startFailHints();
    });

    memoryBtn.addEventListener("click", () => {
      if (!isImageReady || hasOpenedArchive) return;
      openArchive();
    });

    memoryInput.addEventListener("input", () => {
      charCount.textContent = `${memoryInput.value.length} / 80`;
    });

    submitMemoryBtn.addEventListener("click", async () => {
      const text = memoryInput.value.trim();

      if (!text) {
        memoryInput.focus();
        return;
      }

      submitMemoryBtn.disabled = true;
      submitMemoryBtn.textContent = "기억을 남기는 중...";

      try {
        const beforeCount = await getMemoryCount();

        await saveMemory(text);

        const afterCount = await getMemoryCount();

        archiveForm.classList.add("hide");
        archiveComplete.classList.add("show");

        animateCount(beforeCount, afterCount);

      } catch (error) {
        console.error(error);

        alert("기억을 저장하지 못했습니다. 다시 시도해주세요.");

        submitMemoryBtn.disabled = false;
        submitMemoryBtn.textContent = "기억 남기기";
      }
    });
  </script>
</body>
</html>
