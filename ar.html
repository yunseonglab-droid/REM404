<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Memory AR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
    }

    #ui {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 9999;
      padding: 12px 14px;
      border-radius: 14px;
      color: #111;
      background: rgba(255,255,255,0.82);
      font-size: 14px;
      line-height: 1.45;
      pointer-events: none;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      backdrop-filter: blur(10px);
    }

    #status {
      font-weight: 850;
      margin-bottom: 4px;
    }

    #memoryBtn {
      position: fixed;
      left: 50%;
      bottom: 34px;
      transform: translateX(-50%) translateY(28px);
      z-index: 9999;
      width: calc(100vw - 48px);
      max-width: 360px;
      height: 58px;
      border: 0;
      border-radius: 999px;
      background: #ffffff;
      color: #111111;
      font-size: 17px;
      font-weight: 850;
      letter-spacing: -0.02em;
      box-shadow: 0 10px 34px rgba(0,0,0,0.30);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease, transform 0.45s ease, background 0.25s ease, color 0.25s ease;
    }

    #memoryBtn.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    #memoryBtn:active {
      transform: translateX(-50%) translateY(0) scale(0.97);
    }

    #memoryBtn.saved {
      background: #111111;
      color: #ffffff;
    }

    #flash {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: #ffffff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: 0 !important;
    }

    canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 1 !important;
    }

    a-scene {
      position: fixed !important;
      inset: 0 !important;
      z-index: 1 !important;
    }
  </style>
</head>

<body>
  <div id="ui">
    <div id="status">전시 사진을 비춰주세요.</div>
    <div id="sub">사진이 인식되면 이미지가 서서히 나타납니다.</div>
  </div>

  <button id="memoryBtn">기억 저장하기</button>
  <div id="flash"></div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/target.mind; autoStart: true; uiScanning: yes; uiLoading: yes; uiError: yes;"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true; antialias: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <img id="aiImage" src="./assets/ai.jpg" crossorigin="anonymous">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-image
        id="aiOverlay"
        src="#aiImage"
        position="0 0 0.01"
        width="1.6"
        height="1"
        material="transparent: true; opacity: 0;">
      </a-image>
    </a-entity>
  </a-scene>

  <script>
    const statusEl = document.getElementById("status");
    const subEl = document.getElementById("sub");
    const target = document.getElementById("target");
    const overlay = document.getElementById("aiOverlay");

    const memoryBtn = document.getElementById("memoryBtn");
    const flash = document.getElementById("flash");

    const FADE_DURATION = 4000;
    let animationFrame = null;
    let startTime = null;
    let isImageReady = false;
    let hasSaved = false;

    function setOpacity(value) {
      overlay.setAttribute("material", "opacity", value);
    }

    function stopFade() {
      if (animationFrame) cancelAnimationFrame(animationFrame);
      animationFrame = null;
      startTime = null;
      setOpacity(0);
    }

    function resetMemoryButton() {
      isImageReady = false;
      hasSaved = false;
      memoryBtn.textContent = "기억 저장하기";
      memoryBtn.classList.remove("show");
      memoryBtn.classList.remove("saved");
    }

    function showMemoryButton() {
      isImageReady = true;
      hasSaved = false;
      memoryBtn.textContent = "기억 저장하기";
      memoryBtn.classList.remove("saved");
      memoryBtn.classList.add("show");
      subEl.textContent = "기억 저장하기 버튼을 눌러 이미지를 저장할 수 있습니다.";
    }

    function startFade() {
      stopFade();
      resetMemoryButton();

      startTime = performance.now();

      function animate(now) {
        const progress = Math.min((now - startTime) / FADE_DURATION, 1);
        const eased = progress < 0.5
          ? 2 * progress * progress
          : 1 - Math.pow(-2 * progress + 2, 2) / 2;

        setOpacity(eased);

        if (progress < 1) {
          animationFrame = requestAnimationFrame(animate);
        } else {
          showMemoryButton();
        }
      }

      animationFrame = requestAnimationFrame(animate);
    }

    function cameraFlash() {
      flash.style.opacity = "1";
      setTimeout(() => {
        flash.style.opacity = "0";
      }, 150);
    }

    function downloadMemoryImage() {
      const link = document.createElement("a");
      link.href = "./assets/ai.jpg";
      link.download = "memory-reconstruction.jpg";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    target.addEventListener("targetFound", () => {
      statusEl.textContent = "사진이 인식되었습니다.";
      subEl.textContent = "이미지가 서서히 나타납니다.";
      startFade();
    });

    target.addEventListener("targetLost", () => {
      statusEl.textContent = "전시 사진을 다시 비춰주세요.";
      subEl.textContent = "인식이 끊어졌습니다.";
      resetMemoryButton();
      stopFade();
    });

    memoryBtn.addEventListener("click", () => {
      if (!isImageReady || hasSaved) return;

      hasSaved = true;
      cameraFlash();

      setTimeout(() => {
        memoryBtn.textContent = "기억이 저장되었습니다.";
        memoryBtn.classList.add("saved");
        subEl.textContent = "재구성된 이미지가 저장되었습니다.";
        downloadMemoryImage();
      }, 170);

      setTimeout(() => {
        memoryBtn.classList.remove("show");
      }, 2600);
    });
  </script>
</body>
</html>
