<!-- ar.html -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>REM404 Archive</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <link rel="stylesheet" href="./css/ar.css" />
</head>

<body>
  <div id="ui">
    <div id="status">사각형 안에 사진을 맞춰주세요.</div>
    <div id="sub">사진 전체가 사각형 안에 들어오도록<br>천천히 맞춰주세요.<br><br>빛 반사를 피해주시면<br>더 빠르게 인식됩니다.</div>
  </div>

  <div id="guide">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>

  <div id="loadingText">
    기억을 불러오는 중
    <div id="loadingLine"></div>
  </div>

  <button id="memoryBtn">기억 남기기</button>
  <div id="flash"></div>

  <div id="archiveScreen">
    <div id="archiveInner">
      <div id="archiveForm" class="archive-state">
        <div class="archive-label archive-animate delay-1">REM404 ARCHIVE</div>

        <h1 class="archive-title archive-animate delay-2">당신의 기억</h1>

        <div class="archive-description archive-animate delay-3">
          이 공간은<br>
          당신에게<br>
          무엇을 떠올리게 했나요?
        </div>

        <div class="archive-action archive-animate delay-4">
          <textarea id="memoryInput" maxlength="80" placeholder="80자 이내로 남겨주세요."></textarea>
          <div id="charCount">0 / 80</div>

          <button id="submitMemoryBtn">기억 남기기</button>
        </div>
      </div>

      <div id="archiveComplete" class="archive-state">
        <div class="archive-label archive-animate delay-1">REM404 ARCHIVE</div>

        <h1 class="archive-title archive-animate delay-2">감사합니다.</h1>

        <div class="archive-description archive-animate delay-3">
          당신의 기억이<br>
          REM404 Archive에 저장되었습니다.
        </div>

        <div class="archive-action archive-animate delay-4">
          <div class="complete-summary">
            <div class="count-label">현재까지</div>
            <div class="count-number" id="memoryCount">0</div>
            <div class="count-desc">
              개의 기억이<br>
              이곳에 남아 있습니다.
            </div>
          </div>

          <div id="anonymousMemoryArea">
            <button id="viewMemoryBtn">다른 기억 보기</button>

            <div class="view-memory-hint">
              다른 사람이 남긴 기억을<br>
              익명으로 볼 수 있습니다.
            </div>

            <div id="sharedMemory">
              <div class="shared-label">ANONYMOUS MEMORY</div>
              <div class="shared-text" id="sharedMemoryText"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/target.mind; autoStart: true; uiScanning: no; uiLoading: no; uiError: yes;"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true; antialias: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <img id="aiImage" src="./assets/ai.jpg" crossorigin="anonymous">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-image
        id="aiOverlay"
        src="#aiImage"
        position="0 0 0.01"
        width="1.6"
        height="1"
        material="transparent: true; opacity: 0;">
      </a-image>
    </a-entity>
  </a-scene>

  <script type="module" src="./js/ar.js"></script>
</body>
</html>
