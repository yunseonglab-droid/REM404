<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Memory AR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
    }

    #ui {
  position: fixed;
  top: 18px;
  left: 16px;
  right: 16px;
  z-index: 9999;
  padding: 12px 14px;
  border-radius: 16px;
  color: #111;
  background: rgba(255,255,255,0.88);
  font-size: 14px;
  line-height: 1.5;
  pointer-events: none;
  box-shadow: 0 8px 28px rgba(0,0,0,0.12);
  backdrop-filter: blur(12px);
  transition: opacity 0.8s ease;
}

#status {
  font-size: 14px;
  font-weight: 850;
  margin-bottom: 3px;
}

#sub {
  font-size: 13px;
  font-weight: 500;
  color: rgba(17,17,17,0.68);
}

    #ui.fade {
      opacity: 0;
    }

    #guide {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(72vw, 420px);
      aspect-ratio: 1.6 / 1;
      transform: translate(-50%, -50%);
      z-index: 9998;
      pointer-events: none;
      opacity: 0.45;
      transition: opacity 0.8s ease;
    }

    #guide.fade {
      opacity: 0;
    }

    .corner {
      position: absolute;
      width: 34px;
      height: 34px;
      border-color: rgba(17,17,17,0.55);
      border-style: solid;
    }

    .tl {
      top: 0;
      left: 0;
      border-width: 1.5px 0 0 1.5px;
    }

    .tr {
      top: 0;
      right: 0;
      border-width: 1.5px 1.5px 0 0;
    }

    .bl {
      bottom: 0;
      left: 0;
      border-width: 0 0 1.5px 1.5px;
    }

    .br {
      bottom: 0;
      right: 0;
      border-width: 0 1.5px 1.5px 0;
    }

    #loadingText {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10002;
      color: rgba(17,17,17,0.68);
      font-size: 13px;
      letter-spacing: 0.04em;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.7s ease;
    }

    #loadingText.hide {
      opacity: 0;
    }

    #loadingLine {
      width: 160px;
      height: 1px;
      margin-top: 14px;
      background: rgba(17,17,17,0.12);
      overflow: hidden;
    }

    #loadingLine::after {
      content: "";
      display: block;
      width: 45%;
      height: 100%;
      background: rgba(17,17,17,0.55);
      animation: lineMove 1.4s ease-in-out infinite;
    }

    @keyframes lineMove {
      0% { transform: translateX(-110%); }
      100% { transform: translateX(260%); }
    }

    #memoryBtn {
      position: fixed;
      left: 50%;
      bottom: 34px;
      transform: translateX(-50%) translateY(28px);
      z-index: 9999;

      width: calc(100vw - 48px);
      max-width: 360px;
      height: 58px;

      border: 0;
      border-radius: 999px;

      background: rgba(255,255,255,0.88);
      color: #111111;

      font-size: 16px;
      font-weight: 850;
      letter-spacing: -0.02em;

      box-shadow: 0 10px 34px rgba(0,0,0,0.26);
      backdrop-filter: blur(10px);

      opacity: 0;
      pointer-events: none;

      transition:
        opacity 0.45s ease,
        transform 0.45s ease,
        background 0.25s ease,
        color 0.25s ease;
    }

    #memoryBtn.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    #memoryBtn:active {
      transform: translateX(-50%) translateY(0) scale(0.97);
    }

    #memoryBtn.saved {
      background: #111111;
      color: #ffffff;
    }

    #flash {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: #ffffff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: 0 !important;
    }

    canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 1 !important;
    }

    a-scene {
      position: fixed !important;
      inset: 0 !important;
      z-index: 1 !important;
    }
  </style>
</head>

<body>
  <div id="ui">
    <div id="status">사진을 화면 중앙에 맞춰주세요.</div>
    <div id="sub">인식되면 기억이 서서히 복원됩니다.</div>
  </div>

  <div id="guide">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>

  <div id="loadingText">
    기억을 찾는 중
    <div id="loadingLine"></div>
  </div>

  <button id="memoryBtn">기억 저장</button>
  <div id="flash"></div>

  <a-scene
    mindar-image="imageTargetSrc: ./assets/target.mind; autoStart: true; uiScanning: no; uiLoading: no; uiError: yes;"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true; antialias: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <img id="aiImage" src="./assets/ai.jpg" crossorigin="anonymous">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-image
        id="aiOverlay"
        src="#aiImage"
        position="0 0 0.01"
        width="1.6"
        height="1"
        material="transparent: true; opacity: 0;">
      </a-image>
    </a-entity>
  </a-scene>

  <script>
    const statusEl = document.getElementById("status");
    const subEl = document.getElementById("sub");
    const uiEl = document.getElementById("ui");
    const guideEl = document.getElementById("guide");
    const loadingText = document.getElementById("loadingText");

    const target = document.getElementById("target");
    const overlay = document.getElementById("aiOverlay");
    const memoryBtn = document.getElementById("memoryBtn");
    const flash = document.getElementById("flash");

    const FADE_DURATION = 6000;
    const FAIL_HINT_1 = 5000;
    const FAIL_HINT_2 = 10000;

    let animationFrame = null;
    let startTime = null;
    let isImageReady = false;
    let hasSaved = false;
    let foundOnce = false;
    let hintTimer1 = null;
    let hintTimer2 = null;

    function setOpacity(value) {
      overlay.setAttribute("material", "opacity", value);
    }

    function stopFade() {
      if (animationFrame) cancelAnimationFrame(animationFrame);
      animationFrame = null;
      startTime = null;
      setOpacity(0);
    }

    function resetMemoryButton() {
      isImageReady = false;
      hasSaved = false;
      memoryBtn.textContent = "기억 저장";
      memoryBtn.classList.remove("show");
      memoryBtn.classList.remove("saved");
    }

    function showMemoryButton() {
      isImageReady = true;
      hasSaved = false;
      memoryBtn.textContent = "기억 저장";
      memoryBtn.classList.remove("saved");
      memoryBtn.classList.add("show");
      subEl.textContent = "복원된 기억을 보존할 수 있습니다.";
    }

    function startFailHints() {
      clearTimeout(hintTimer1);
      clearTimeout(hintTimer2);

      hintTimer1 = setTimeout(() => {
        if (!foundOnce) {
          statusEl.textContent = "사진과의 거리를 조금 조정해보세요.";
          subEl.textContent = "화면 중앙에 사진이 크게 들어오면 인식이 쉬워집니다.";
        }
      }, FAIL_HINT_1);

      hintTimer2 = setTimeout(() => {
        if (!foundOnce) {
          statusEl.textContent = "빛 반사를 피해주세요.";
          subEl.textContent = "사진 표면이 너무 밝게 반사되면 인식이 어려울 수 있습니다.";
        }
      }, FAIL_HINT_2);
    }

    function stopFailHints() {
      clearTimeout(hintTimer1);
      clearTimeout(hintTimer2);
    }

    function startFade() {
      stopFade();
      resetMemoryButton();

      startTime = performance.now();

      function animate(now) {
        const progress = Math.min((now - startTime) / FADE_DURATION, 1);

        const eased = progress < 0.35
          ? progress * 0.45
          : 0.1575 + ((progress - 0.35) / 0.65) * 0.8425;

        setOpacity(eased);

        if (progress < 1) {
          animationFrame = requestAnimationFrame(animate);
        } else {
          showMemoryButton();
        }
      }

      animationFrame = requestAnimationFrame(animate);
    }

    function cameraFlash() {
      flash.style.opacity = "1";
      setTimeout(() => {
        flash.style.opacity = "0";
      }, 150);
    }

    function downloadMemoryImage() {
      const link = document.createElement("a");
      link.href = "./assets/ai.jpg";
      link.download = "REM404_recovered_memory.jpg";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function hideIntroUI() {
      loadingText.classList.add("hide");
      guideEl.classList.add("fade");
    }

    function fadeInstructionLater() {
      setTimeout(() => {
        uiEl.classList.add("fade");
      }, 3500);
    }

    window.addEventListener("load", () => {
      foundOnce = false;
      startFailHints();
    });

    target.addEventListener("targetFound", () => {
      foundOnce = true;
      stopFailHints();
      hideIntroUI();

      statusEl.textContent = "사진이 인식되었습니다.";
      subEl.textContent = "기억이 서서히 복원됩니다.";
      startFade();
      fadeInstructionLater();
    });

    target.addEventListener("targetLost", () => {
      foundOnce = false;

      statusEl.textContent = "전시 사진을 다시 비춰주세요.";
      subEl.textContent = "거리와 빛 반사를 조정해보세요.";
      uiEl.classList.remove("fade");
      guideEl.classList.remove("fade");
      loadingText.classList.remove("hide");

      resetMemoryButton();
      stopFade();
      startFailHints();
    });

    memoryBtn.addEventListener("click", () => {
      if (!isImageReady || hasSaved) return;

      hasSaved = true;
      cameraFlash();

      setTimeout(() => {
        memoryBtn.textContent = "기억이 보존되었습니다.";
        memoryBtn.classList.add("saved");
        subEl.textContent = "재구성된 기억이 보존되었습니다.";
        downloadMemoryImage();
      }, 170);

      setTimeout(() => {
        memoryBtn.classList.remove("show");
        uiEl.classList.add("fade");
      }, 2600);
    });
  </script>
</body>
</html>
