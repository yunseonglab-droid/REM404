<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>REM404 Admin</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  min-height: 100%;
  background: #fff;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
}

body {
  padding: 28px;
  box-sizing: border-box;
}

main {
  width: 100%;
  max-width: 420px;
  margin: 0 auto;
  padding: 42px 0 48px;
}

.label {
  font-size: 12px;
  letter-spacing: .16em;
  color: #888;
  margin-bottom: 28px;
}

h1 {
  font-size: 34px;
  line-height: 1.18;
  margin: 0 0 18px;
  font-weight: 850;
  letter-spacing: -.05em;
}

.desc {
  font-size: 14px;
  line-height: 1.75;
  color: #666;
  margin-bottom: 34px;
}

.version {
  padding: 16px;
  border-radius: 18px;
  background: #fafafa;
  border: 1px solid rgba(17,17,17,.1);
  margin-bottom: 28px;
}

.version .small {
  font-size: 12px;
  color: #888;
  margin-bottom: 6px;
}

.version .big {
  font-size: 20px;
  font-weight: 850;
  letter-spacing: -.04em;
}

.menu {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.menu a {
  display: block;
  padding: 18px 18px;
  border-radius: 20px;
  border: 1px solid rgba(17,17,17,.1);
  color: #111;
  text-decoration: none;
  background: #fff;
  box-shadow: 0 10px 28px rgba(0,0,0,.05);
  transition: transform .18s ease, background .18s ease;
}

.menu a:active {
  transform: scale(.98);
}

.menu-title {
  font-size: 16px;
  font-weight: 850;
  letter-spacing: -.04em;
  margin-bottom: 6px;
}

.menu-desc {
  font-size: 13px;
  line-height: 1.6;
  color: #777;
}

.disabled {
  opacity: .42;
  pointer-events: none;
}
</style>
</head>

<body>
<main>
  <div class="label">REM404 ADMIN</div>

  <h1>
    Archive<br>
    Control Room
  </h1>

  <div class="desc">
    REM404의 오류 기록, 버전 상태, 아카이브 운영 정보를 확인하는 작가용 관리 페이지입니다.
  </div>

  <div class="version">
    <div class="small">Current Build</div>
    <div class="big">v0.5.1 Beta</div>
  </div>

  <nav class="menu">
    <a href="./debug.html">
      <div class="menu-title">Debug Dashboard</div>
      <div class="menu-desc">
        오류 로그와 발생 환경을 확인합니다.
      </div>
    </a>

    <a class="disabled" href="#">
      <div class="menu-title">Version History</div>
      <div class="menu-desc">
        추후 버전별 업데이트 기록을 관리합니다.
      </div>
    </a>

    <a class="disabled" href="#">
      <div class="menu-title">Archive Statistics</div>
      <div class="menu-desc">
        추후 기억 수, 언어 비율, 사용 기록을 확인합니다.
      </div>
    </a>
  </nav>
</main>
</body>
</html>
