<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>남겨진 사람들의 기억과 흔적</title>

<style>
html,body{
  margin:0;
  width:100%;
  min-height:100%;
  background:#fff;
  color:#111;
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;
}

body{
  min-height:100svh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px;
  box-sizing:border-box;
}
  
main{
  width:100%;
  max-width:420px;
}
  
#languageSelector{
  display:flex;
  justify-content:flex-end;
  gap:12px;
  margin-bottom:28px;
}

#languageSelector button{
  border:none;
  background:none;
  padding:0;
  color:#9a9a9a;
  font-size:12px;
  font-weight:700;
  letter-spacing:.08em;
  cursor:pointer;
  transition:.2s;
}

#languageSelector button.active{
  color:#111;
}
  
.label{
  font-size:12px;
  letter-spacing:.12em;
  color:#888;
  margin-bottom:34px;
}

h1{
  font-size:32px;
  line-height:1.25;
  margin:0 0 30px;
  font-weight:850;
  letter-spacing:-.05em;
}

.text{
  font-size:15px;
  line-height:1.85;
  color:#333;
  margin-bottom:34px;
}

.notice{
  font-size:13px;
  line-height:1.7;
  color:#777;
  margin-bottom:34px;
}

#startBtn{
  display:block;
  text-align:center;
  padding:16px 20px;
  border-radius:999px;
  background:#111;
  color:#fff;
  text-decoration:none;
  font-size:16px;
  font-weight:850;
  box-shadow:0 10px 30px rgba(0,0,0,.12);
  transition:.2s;
}

#startBtn:active{
  transform:scale(.98);
}

/* ---------- Transition ---------- */

#transition{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .9s ease;
  z-index:99999;
}

#transition.show{
  opacity:1;
}

#transitionText{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  opacity:0;
  transform:translateY(-12px);
  transition:
    opacity .55s cubic-bezier(.22,1,.36,1) .18s,
    transform .55s cubic-bezier(.22,1,.36,1) .18s;
}

#transition.show #transitionText{
  opacity:1;
  transform:translateY(0);
}

#transitionText .title{
  font-size:12px;
  letter-spacing:.18em;
  color:#8a8a8a;
  margin-bottom:14px;
}

#transitionText .subtitle{
  font-size:18px;
  font-weight:700;
  letter-spacing:-.03em;
  color:#222;
}
</style>
</head>

<body>
<main>
  <div id="languageSelector">
  <button type="button" data-lang="ko">KR</button>
  <button type="button" data-lang="en">EN</button>
</div>
<div class="label" id="versionLabel">REM404 v0.5 Beta</div>

<h1 id="landingTitle">
  남겨진 사람들의<br>
  기억과 흔적
</h1>

<div class="text" id="landingText">
  이곳에 남겨진 것은<br>
  건물이 아니라 기억입니다.<br><br>
  카메라를 통해 전시 사진을 비추면,<br>
  다른 이미지가 서서히 나타납니다.
</div>

<div class="notice" id="landingNotice">
  이 경험은 스마트폰 카메라를 사용합니다.<br>
  별도의 앱 설치는 필요하지 않습니다.
</div>

<a href="./ar.html" id="startBtn">기억 복원하기</a>
</main>

<div id="transition">
  <div id="transitionText">
   <div class="title" id="transitionVersion">REM404 v0.5 Beta</div>
    <div class="subtitle" id="transitionSubtitle">기억에 접근하는 중...</div>
  </div>
</div>

<script type="module">
import { getText, getLanguage, setLanguage } from "./js/lang/language.js";

function applyLandingText() {
  const t = getText();

  document.title = t.landing.pageTitle;
  document.documentElement.lang = getLanguage();

  document.getElementById("versionLabel").textContent = t.landing.version;
  document.getElementById("landingTitle").innerHTML = t.landing.title;
  document.getElementById("landingText").innerHTML = t.landing.text;
  document.getElementById("landingNotice").innerHTML = t.landing.notice;
  document.getElementById("startBtn").textContent = t.landing.startButton;
  document.getElementById("transitionVersion").textContent = t.landing.version;
  document.getElementById("transitionSubtitle").textContent = t.landing.loading;

  document.querySelectorAll("#languageSelector button").forEach((button) => {
    button.classList.toggle("active", button.dataset.lang === getLanguage());
  });
}

document.querySelectorAll("#languageSelector button").forEach((button) => {
  button.addEventListener("click", () => {
    setLanguage(button.dataset.lang);
    applyLandingText();
  });
});

applyLandingText();
let adminTapCount = 0;
let adminTapTimer = null;

const landingTitle = document.getElementById("landingTitle");

if (landingTitle) {
  landingTitle.addEventListener("click", () => {
    adminTapCount += 1;

    clearTimeout(adminTapTimer);

    adminTapTimer = setTimeout(() => {
      adminTapCount = 0;
    }, 1200);

    if (adminTapCount >= 3) {
      adminTapCount = 0;
      window.location.href = "./admin.html";
    }
  });
}
  
const startBtn = document.getElementById("startBtn");
const transition = document.getElementById("transition");

startBtn.addEventListener("click", (e) => {
  e.preventDefault();

  transition.classList.add("show");

  setTimeout(() => {
    window.location.href = `./ar.html?lang=${getLanguage()}`;
  }, 900);
});
</script>
