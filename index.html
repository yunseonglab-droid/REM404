<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>UM Research Lab - WebAR Prototype A</title>

  <!-- A-Frame + MindAR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
    }

    #ui {
      position: fixed;
      z-index: 10;
      top: 14px;
      left: 14px;
      right: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      color: white;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(8px);
      font-size: 14px;
      line-height: 1.45;
      pointer-events: none;
    }

    #status {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .hidden {
      opacity: 0;
      transition: opacity 0.4s ease;
    }
  </style>
</head>

<body>
  <div id="ui">
    <div id="status">카메라를 허용한 뒤, 전시 사진을 비춰주세요.</div>
    <div id="sub">사진이 인식되면 AI 이미지가 천천히 나타납니다.</div>
  </div>

  <!--
    중요:
    1) assets/target.mind 파일이 반드시 있어야 합니다.
    2) assets/ai.jpg 파일이 반드시 있어야 합니다.
    3) targetIndex="0"은 첫 번째 타깃 이미지를 뜻합니다.
  -->
  <a-scene
    mindar-image="imageTargetSrc: ./assets/target.mind; autoStart: true; uiScanning: yes; uiLoading: yes; uiError: yes;"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true">

    <a-assets>
      <img id="aiImage" src="./assets/ai.jpg" crossorigin="anonymous" />
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <!--
        width/height는 실제 원본 사진 비율에 맞게 조정하세요.
        예: 세로 사진이면 width="1" height="1.5"
            가로 사진이면 width="1.5" height="1"
      -->
      <a-image
        id="aiOverlay"
        src="#aiImage"
        position="0 0 0.01"
        width="1"
        height="1"
        material="transparent: true; opacity: 0;">
      </a-image>
    </a-entity>
  </a-scene>

  <script>
    const statusEl = document.getElementById("status");
    const subEl = document.getElementById("sub");
    const uiEl = document.getElementById("ui");

    const target = document.getElementById("target");
    const overlay = document.getElementById("aiOverlay");

    let fadeRequest = null;
    let fadeStart = null;

    // 페이드 시간: 여기 숫자만 바꾸면 됨. 4000 = 4초
    const FADE_DURATION_MS = 4000;

    function setOpacity(value) {
      overlay.setAttribute("material", "opacity", String(value));
    }

    function stopFade() {
      if (fadeRequest) cancelAnimationFrame(fadeRequest);
      fadeRequest = null;
      fadeStart = null;
    }

    function startFade() {
      stopFade();
      setOpacity(0);

      fadeStart = performance.now();

      function step(now) {
        const elapsed = now - fadeStart;
        const progress = Math.min(elapsed / FADE_DURATION_MS, 1);

        // ease-in-out 느낌
        const eased = progress < 0.5
          ? 2 * progress * progress
          : 1 - Math.pow(-2 * progress + 2, 2) / 2;

        setOpacity(eased);

        if (progress < 1) {
          fadeRequest = requestAnimationFrame(step);
        } else {
          fadeRequest = null;
        }
      }

      fadeRequest = requestAnimationFrame(step);
    }

    target.addEventListener("targetFound", () => {
      statusEl.textContent = "사진이 인식되었습니다.";
      subEl.textContent = "기억이 서서히 재구성됩니다.";
      uiEl.classList.remove("hidden");
      startFade();
    });

    target.addEventListener("targetLost", () => {
      statusEl.textContent = "사진을 다시 비춰주세요.";
      subEl.textContent = "인식이 끊어졌습니다.";
      stopFade();
      setOpacity(0);
    });
  </script>
</body>
</html>
